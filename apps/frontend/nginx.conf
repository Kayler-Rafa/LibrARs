server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS interno do Docker (necessario para proxy_pass com hostname de servico)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # REST API -- repassa para o backend FastAPI (Python)
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.io -- suporta WebSocket e long-polling
    location /socket.io/ {
        proxy_pass         http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check do backend (util para monitoramento)
    location /health {
        proxy_pass http://backend:3001/health;
    }

    # SPA fallback -- todas as rotas do React Router vao para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
