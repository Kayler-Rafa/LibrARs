server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # REST API -- repassa para o backend FastAPI
    location /api/ {
        proxy_pass              http://backend:3001/api/;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Timeouts generosos para endpoints de export/analytics
        proxy_connect_timeout   30s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;

        # Desativa buffer para responses grandes (dataset bruto)
        proxy_buffering         off;
        proxy_request_buffering off;
    }

    # Socket.io -- suporta WebSocket e long-polling
    location /socket.io/ {
        proxy_pass          http://backend:3001/socket.io/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  "upgrade";
        proxy_set_header    Host        $host;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  3600s;
    }

    # Health check
    location /health {
        proxy_pass http://backend:3001/health;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
