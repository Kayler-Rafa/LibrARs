services:
  # -- Backend API + WebSocket --------------------------------------------------
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${SERVICE_URL_FRONTEND:-http://localhost:5173}
      PORT: 3001
    expose:
      - "3001"
    networks:
      - default
      - coolify

  # -- Frontend (Nginx) ---------------------------------------------------------
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  coolify:
    external: true